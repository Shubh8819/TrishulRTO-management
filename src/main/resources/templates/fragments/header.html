<!-- ========== HEADER STYLES FRAGMENT ========== -->
<th:block th:fragment="header-styles">
    <style>
        .header {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 20px 28px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle-btn {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
        }

        .menu-toggle-btn:hover {
            background: var(--bg-light);
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .header-title p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 16px rgba(79,70,229,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(79,70,229,0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--bg-light);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .menu-toggle-btn {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
            }

            .header-title h1 {
                font-size: 18px;
            }

            .header-actions .btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .header-left {
                justify-content: center;
            }

            .header-actions {
                justify-content: center;
            }
        }
    </style>
</th:block>
</body>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Licence Management System</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Common Styles -->
    <th:block th:replace="fragments/layout :: common-styles"></th:block>

    <!-- Sidebar Styles -->
    <th:block th:replace="fragments/sidebar :: sidebar-styles"></th:block>

    <!-- Header Styles -->
    <th:block th:replace="fragments/header :: header-styles"></th:block>
</head>
<style>
    .header {
           background: var(--white);
           border-radius: var(--radius-xl);
           padding: 20px 28px;
           margin-bottom: 24px;
           box-shadow: var(--shadow-sm);
           display: flex;
           justify-content: space-between;
           align-items: center;
           flex-wrap: wrap;
           gap: 16px;
           border: 1px solid rgba(0,0,0,0.04);
       }

       .header-left {
           display: flex;
           align-items: center;
           gap: 16px;
       }

       .menu-toggle-btn {
           display: none;
           background: none;
           border: none;
           font-size: 22px;
           color: var(--text-primary);
           cursor: pointer;
           padding: 4px;
           border-radius: var(--radius-sm);
           transition: all 0.3s ease;
       }

       .menu-toggle-btn:hover {
           background: var(--bg-light);
       }

       .header-title h1 {
           font-size: 22px;
           font-weight: 800;
           color: var(--text-primary);
       }

       .header-title p {
           font-size: 13px;
           color: var(--text-secondary);
           margin-top: 2px;
       }

       .header-actions {
           display: flex;
           gap: 10px;
           flex-wrap: wrap;
       }

       .btn {
           display: inline-flex;
           align-items: center;
           gap: 8px;
           padding: 10px 24px;
           border: none;
           border-radius: var(--radius-md);
           font-weight: 600;
           font-size: 14px;
           cursor: pointer;
           transition: all 0.3s ease;
           text-decoration: none;
       }

       .btn-primary {
           background: var(--primary-gradient);
           color: white;
           box-shadow: 0 4px 16px rgba(79,70,229,0.3);
       }

       .btn-primary:hover {
           transform: translateY(-2px);
           box-shadow: 0 6px 24px rgba(79,70,229,0.4);
       }

       .btn-outline {
           background: transparent;
           color: var(--text-secondary);
           border: 2px solid var(--bg-light);
       }

       .btn-outline:hover {
           border-color: var(--primary);
           color: var(--primary);
           transform: translateY(-2px);
       }

       @media (max-width: 1024px) {
           .menu-toggle-btn {
               display: block;
           }
       }

       @media (max-width: 768px) {
           .header {
               padding: 16px 20px;
           }

           .header-title h1 {
               font-size: 18px;
           }

           .header-actions .btn {
               padding: 8px 16px;
               font-size: 12px;
           }
       }

       @media (max-width: 480px) {
           .header {
               flex-direction: column;
               align-items: stretch;
               text-align: center;
           }

           .header-left {
               justify-content: center;
           }

           .header-actions {
               justify-content: center;
           }
       }



</style>
<body>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<th:block th:replace="fragments/sidebar :: sidebar"></th:block>

<!-- Main Content -->
<main class="main-content">
    <!-- Header -->


    <!-- Page Content -->
    <div th:replace="~{${pageContent} :: pageContent}"></div>
</main>

<!-- Common Scripts -->
<th:block th:replace="fragments/layout :: common-scripts"></th:block>

<!-- Page Specific Scripts
<th:block th:if="${pageScripts != null}" th:replace="${pageScripts}"></th:block>-->



<!-- ========== COMMON STYLES FRAGMENT ========== -->
<th:block th:fragment="common-styles">
    <style>
        /* ============================================
           COMMON STYLES FOR ALL PAGES
           ============================================ */
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --primary-light: #818cf8;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%);
            --secondary: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;

            --bg-dark: #0f172a;
            --bg-light: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --white: #ffffff;

            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 24px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 48px rgba(0,0,0,0.15);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;

            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            min-height: 100vh;
            padding: 20px;
        }

        .page-content {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Sidebar Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block !important;
        }

        /* Alert */
        .alert {
            padding: 14px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.4s ease;
            border-left: 4px solid;
        }

        .alert-success { background: #d1fae5; color: var(--success); border-color: var(--success); }
        .alert-danger { background: #fee2e2; color: var(--danger); border-color: var(--danger); }
        .alert-warning { background: #fef3c7; color: var(--warning); border-color: var(--warning); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .no-data i {
            font-size: 56px;
            color: var(--bg-light);
            margin-bottom: 16px;
            display: block;
        }

        .no-data h4 {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .no-data p {
            font-size: 14px;
            color: var(--text-light);
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success { background: #d1fae5; color: var(--success); }
        .badge-warning { background: #fef3c7; color: var(--warning); }
        .badge-danger { background: #fee2e2; color: var(--danger); }
        .badge-info { background: #dbeafe; color: var(--info); }

        /* Stats Card */
        .stat-card {
            background: var(--white);
            padding: 20px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-card .stat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .stat-card .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .stat-card .stat-icon.blue { background: rgba(79,70,229,0.1); color: var(--primary); }
        .stat-card .stat-icon.green { background: rgba(16,185,129,0.1); color: var(--success); }
        .stat-card .stat-icon.orange { background: rgba(245,158,11,0.1); color: var(--warning); }
        .stat-card .stat-icon.red { background: rgba(239,68,68,0.1); color: var(--danger); }
        .stat-card .stat-icon.purple { background: rgba(139,92,246,0.1); color: var(--purple); }
        .stat-card .stat-icon.pink { background: rgba(236,72,153,0.1); color: var(--pink); }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
        }

        /* Service Card */
        .service-card {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .service-card .service-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }

        .service-card .service-icon.blue { background: rgba(79,70,229,0.1); color: var(--primary); }
        .service-card .service-icon.orange { background: rgba(245,158,11,0.1); color: var(--warning); }
        .service-card .service-icon.green { background: rgba(16,185,129,0.1); color: var(--success); }
        .service-card .service-icon.purple { background: rgba(139,92,246,0.1); color: var(--purple); }

        .service-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .service-card p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .service-card .service-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
        }

        .service-card .service-stats .stat {
            text-align: center;
        }

        .service-card .service-stats .stat .num {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .service-card .service-stats .stat .label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .service-card .service-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Button Small */
        .btn-sm {
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-sm.primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-sm.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79,70,229,0.3);
        }

        .btn-sm.primary-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-sm.primary-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-sm.warning {
            background: var(--warning);
            color: white;
        }

        .btn-sm.warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245,158,11,0.3);
        }

        .btn-sm.warning-outline {
            background: transparent;
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .btn-sm.warning-outline:hover {
            background: var(--warning);
            color: white;
        }

        .btn-sm.success {
            background: var(--success);
            color: white;
        }

        .btn-sm.success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }

        .btn-sm.success-outline {
            background: transparent;
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-sm.success-outline:hover {
            background: var(--success);
            color: white;
        }

        .btn-sm.purple {
            background: var(--purple);
            color: white;
        }

        .btn-sm.purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139,92,246,0.3);
        }

        .btn-sm.purple-outline {
            background: transparent;
            color: var(--purple);
            border: 1px solid var(--purple);
        }

        .btn-sm.purple-outline:hover {
            background: var(--purple);
            color: white;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0;
                padding: 12px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 10px;
            }

            .stat-card .stat-value {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .stat-card {
                padding: 16px 18px;
            }

            .stat-card .stat-value {
                font-size: 18px;
            }

            .service-card {
                padding: 18px;
            }

            .service-card .service-stats {
                gap: 12px;
            }

            .service-card .service-stats .stat .num {
                font-size: 15px;
            }
        }
    </style>
</th:block>

<!-- ========== COMMON SCRIPTS FRAGMENT ========== -->
<th:block th:fragment="common-scripts">

    <script>
        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar) {
                sidebar.classList.toggle('open');
                if (overlay) overlay.classList.toggle('active');
            }
        }

        // Close sidebar on resize to desktop
        window.addEventListener('resize', function() {
            if (window.innerWidth > 1024) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                if (sidebar) sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
            }
        });

        // Auto hide alerts
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                if (alert) {
                    alert.style.transition = 'all 0.5s ease';
                    alert.style.opacity = '0';
                    alert.style.transform = 'translateY(-20px)';
                    setTimeout(() => alert.style.display = 'none', 500);
                }
            });
        }, 5000);

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const modals = document.querySelectorAll('.modal.show');
                modals.forEach(modal => modal.classList.remove('show'));
            }
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.focus();
            }
        });

        console.log('%c🚀 Licence Management System v3.0', 'font-size:20px; font-weight:bold; color:#4f46e5;');
    </script>
</th:block>
</body>
</html>

spring.application.name=trishul
spring.datasource.url=jdbc:sqlserver://192.168.100.55:1440;databaseName=Java_Interview;encrypt=true;trustServerCertificate=true

spring.datasource.username=eProcDeveloper
spring.datasource.password=Epr0c@1234!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL logs
logging.level.org.hibernate.SQL=DEBUG
